<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kailash Hospital AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* animated typing dots */
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2 } 40% { opacity: 1 } }
    .dot { animation: blink 1.4s infinite both; }
    .dot:nth-child(2) { animation-delay: 0.2s }
    .dot:nth-child(3) { animation-delay: 0.4s }
    #chat { scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-800 to-teal-700 text-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
      <img src="/static/kailash_logo.jpeg" alt="Kailash Hospital" class="w-11 h-11 rounded-full bg-white object-contain p-0.5" onerror="this.style.display='none'">
      <div class="flex-grow">
        <h1 class="text-lg sm:text-xl font-semibold leading-tight">Kailash Hospital AI Assistant</h1>
        <div class="flex items-center gap-1.5 text-xs text-teal-100">
          <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span> Online · symptom check, appointments &amp; info
        </div>
      </div>
    </div>
  </header>

  <!-- Chat Card -->
  <main class="flex-grow w-full max-w-3xl mx-auto px-3 sm:px-4 py-4 flex flex-col">
    <div class="flex-grow bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden border border-slate-200">

      <!-- Messages -->
      <div id="chat" class="flex-grow overflow-y-auto p-4 sm:p-5 space-y-4 min-h-[380px]" style="max-height: calc(100vh - 320px)"></div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="px-5 pb-1 hidden">
        <div class="inline-flex items-center gap-1 text-slate-400 text-sm">
          <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
          <span id="typingLabel" class="ml-1">Assistant is typing…</span>
        </div>
      </div>

      <!-- Input Section -->
      <div class="border-t border-slate-200 p-4 bg-slate-50/60">

        <!-- Patient Info Form -->
        <div id="form" class="grid sm:grid-cols-[1fr_1fr_auto] gap-3">
          <input id="patient_name" type="text" placeholder="Your full name"
                 class="px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" />
          <input id="patient_id" type="text" placeholder="Patient ID (e.g. 1234)"
                 class="px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" />
          <button onclick="lockInfo()"
                  class="bg-teal-600 hover:bg-teal-700 text-white font-medium px-6 py-2.5 rounded-lg transition-colors">Start Chat</button>
        </div>

        <!-- Suggested prompts + Message Input -->
        <div id="chatInputRow" class="hidden">
          <div id="suggestions" class="flex flex-wrap gap-2 mb-3"></div>
          <div class="flex gap-2">
            <input id="user_input" type="text" placeholder="Type your message…" autocomplete="off"
                   class="flex-grow px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" />
            <button id="sendBtn" onclick="sendMessage()"
                    class="bg-blue-700 hover:bg-blue-800 disabled:opacity-50 text-white font-medium px-5 py-2.5 rounded-lg transition-colors inline-flex items-center gap-2">
              Send
            </button>
          </div>
          <div class="mt-3 text-center">
            <button onclick="resetChat()" class="text-xs text-slate-500 hover:text-blue-700 underline">Start new chat</button>
          </div>
        </div>
      </div>
    </div>

    <p class="text-[11px] text-slate-400 text-center mt-3 px-4">
      For education/demo only — not a medical device. Always consult a qualified clinician.
    </p>
  </main>

  <script>
    const chatDiv = document.getElementById("chat");
    const nameInput = document.getElementById("patient_name");
    const idInput = document.getElementById("patient_id");
    const userInput = document.getElementById("user_input");
    const sendBtn = document.getElementById("sendBtn");
    const formDiv = document.getElementById("form");
    const chatInputRow = document.getElementById("chatInputRow");
    const typingIndicator = document.getElementById("typingIndicator");
    const typingLabel = document.getElementById("typingLabel");
    const suggestionsDiv = document.getElementById("suggestions");

    let patientName = "";
    let patientId = "";
    let firstMessage = true;

    const WELCOME_HTML =
      "<div class='h-full min-h-[340px] flex flex-col items-center justify-center text-center px-6 py-8 select-none'>" +
        "<div class='w-16 h-16 rounded-2xl bg-teal-100 text-teal-700 flex items-center justify-center text-4xl mb-4'>🏥</div>" +
        "<h2 class='text-lg font-semibold text-slate-700'>Welcome to Kailash Hospital</h2>" +
        "<p class='text-sm text-slate-500 mt-1 max-w-sm'>Your AI assistant for symptom checks, appointments, and hospital information. Enter your details below to start.</p>" +
        "<div class='flex flex-wrap gap-2 justify-center mt-5 text-xs text-slate-500'>" +
          "<span class='bg-slate-100 px-3 py-1.5 rounded-full'>🩺 Symptom check</span>" +
          "<span class='bg-slate-100 px-3 py-1.5 rounded-full'>📅 Appointments</span>" +
          "<span class='bg-slate-100 px-3 py-1.5 rounded-full'>ℹ️ Hospital info</span>" +
        "</div>" +
      "</div>";

    function showWelcome() { chatDiv.innerHTML = WELCOME_HTML; }
    showWelcome();

    const SUGGESTIONS = [
      "Where is the hospital and what departments are there?",
      "What appointments do I have booked?",
      "I have a sore throat and mild fever — what should I do?",
      "Book me a cardiology appointment",
    ];

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Lightweight, safe markdown-ish renderer for assistant replies.
    function renderMarkdown(text) {
      let t = String(text).replace(/\/n/g, "\n").replace(/\r/g, "");
      t = escapeHtml(t);
      t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      const lines = t.split("\n");
      let html = "", inList = false, listType = "";
      const closeList = () => { if (inList) { html += "</" + listType + ">"; inList = false; listType = ""; } };
      for (const raw of lines) {
        const line = raw.trimEnd();
        const ol = line.match(/^\s*\d+\.\s+(.*)/);
        const ul = line.match(/^\s*[-•*]\s+(.*)/);
        if (ol) {
          if (listType !== "ol") { closeList(); html += "<ol class='list-decimal ml-5 space-y-0.5 my-1'>"; inList = true; listType = "ol"; }
          html += "<li>" + ol[1] + "</li>";
        } else if (ul) {
          if (listType !== "ul") { closeList(); html += "<ul class='list-disc ml-5 space-y-0.5 my-1'>"; inList = true; listType = "ul"; }
          html += "<li>" + ul[1] + "</li>";
        } else {
          closeList();
          html += line === "" ? "<div class='h-2'></div>" : "<div>" + line + "</div>";
        }
      }
      closeList();
      return html;
    }

    function appendMessage(sender, text) {
      const msg = document.createElement("div");
      const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      if (sender === "user") {
        msg.className = "flex justify-end";
        msg.innerHTML =
          "<div class='bg-blue-600 text-white px-4 py-2.5 rounded-2xl rounded-br-sm max-w-[82%] shadow-sm'>" +
            "<div>" + escapeHtml(text) + "</div>" +
            "<div class='text-[10px] mt-1 text-blue-100 text-right'>" + time + "</div>" +
          "</div>";
      } else {
        msg.className = "flex items-start gap-2.5";
        msg.innerHTML =
          "<div class='w-8 h-8 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-lg shrink-0 mt-0.5'>🏥</div>" +
          "<div class='bg-slate-100 text-slate-800 px-4 py-2.5 rounded-2xl rounded-tl-sm max-w-[82%] shadow-sm leading-relaxed'>" +
            "<div>" + renderMarkdown(text) + "</div>" +
            "<div class='text-[10px] mt-1 text-slate-400'>" + time + "</div>" +
          "</div>";
      }
      chatDiv.appendChild(msg);
      chatDiv.scrollTo({ top: chatDiv.scrollHeight, behavior: "smooth" });
    }

    function renderSuggestions() {
      suggestionsDiv.innerHTML = "";
      SUGGESTIONS.forEach((s) => {
        const b = document.createElement("button");
        b.className = "text-xs bg-white border border-slate-300 text-slate-600 px-3 py-1.5 rounded-full hover:border-blue-500 hover:text-blue-700 transition-colors";
        b.textContent = s;
        b.onclick = () => { userInput.value = s; sendMessage(); };
        suggestionsDiv.appendChild(b);
      });
    }

    function lockInfo() {
      patientName = nameInput.value.trim();
      patientId = idInput.value.trim();
      if (!patientName || !patientId) {
        alert("Please enter both your name and patient ID to continue.");
        return;
      }
      formDiv.style.display = "none";
      chatInputRow.classList.remove("hidden");
      chatDiv.innerHTML = "";
      renderSuggestions();
      appendMessage("bot", "Hi " + patientName + " 👋 I'm the Kailash Hospital assistant. I can share hospital info, check your symptoms, or help with appointments. What can I help you with today?");
      userInput.focus();
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage("user", message);
      userInput.value = "";
      suggestionsDiv.innerHTML = "";
      userInput.disabled = true;
      sendBtn.disabled = true;
      typingLabel.textContent = firstMessage ? "Waking up the assistant (first message can take ~30s)…" : "Assistant is typing…";
      typingIndicator.classList.remove("hidden");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, patient_name: patientName, patient_id: patientId }),
        });
        const data = await response.json();
        if (response.ok) {
          appendMessage("bot", data.response || "Sorry, I couldn't generate a response.");
        } else if (response.status === 503) {
          appendMessage("bot", "I'm still starting up — please send that again in a few seconds.");
        } else {
          appendMessage("bot", "Something went wrong: " + (data.detail || "please try again."));
        }
      } catch (e) {
        appendMessage("bot", "I couldn't reach the server. Please check your connection and try again.");
      } finally {
        firstMessage = false;
        userInput.disabled = false;
        sendBtn.disabled = false;
        typingIndicator.classList.add("hidden");
        userInput.focus();
      }
    }

    function resetChat() {
      nameInput.value = "";
      idInput.value = "";
      patientName = "";
      patientId = "";
      firstMessage = true;
      showWelcome();
      suggestionsDiv.innerHTML = "";
      formDiv.style.display = "grid";
      chatInputRow.classList.add("hidden");
      typingIndicator.classList.add("hidden");
      nameInput.focus();
    }

    // Enter-to-send / Enter-to-start
    userInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); sendMessage(); } });
    idInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); lockInfo(); } });
    nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); idInput.focus(); } });
    nameInput.focus();
  </script>
</body>
</html>
